name: Compile and run unit tests

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          sudo apt update -y
          sudo apt install -y libudev-dev libusb-1.0-0-dev
      - run: npm run setup:ci
      - run: npm run compile
      - run: npm run test:unit
