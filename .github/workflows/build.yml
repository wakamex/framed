name: Build and publish installer artifacts for all platforms

on:
  push:
    branches:
      - 'main'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  create_draft_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: read version from package.json
        id: package-version
        run: echo "current-version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
      - name: check for existing release
        run: gh release list --exclude-drafts | grep -q ".*v${{ steps.package-version.outputs.current-version }}" && exit 1 || true
      - name: remove old draft releases
        run: gh release list | grep -e "Draft.*v${{ steps.package-version.outputs.current-version }}" | awk '{print $3}' | xargs -r -n1 gh release delete
      - name: create new draft release
        run: gh release create "v${{ steps.package-version.outputs.current-version }}" --draft --title "${{ steps.package-version.outputs.current-version }}"

  build_release:
    needs: [create_draft_release]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    env:
      # Signing env vars are only effective when secrets are configured.
      # electron-builder skips signing when CSC_LINK is unset.
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: install Linux dev tools
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update -y
          sudo apt install -y libudev-dev libusb-1.0-0-dev
      - name: install macOS dev tools
        if: startsWith(matrix.os, 'macos')
        run: |
          sudo -H pip install setuptools
      - name: create NPM config file
        shell: bash
        run: |
          if [ -n "$NPM_AUTH_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_AUTH_TOKEN" > ./.npmrc
          fi
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
      - name: install deps and run allowed scripts
        shell: bash
        run: |
          npm ci --ignore-scripts
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));delete p.scripts.postinstall;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm run setup:scripts
          git checkout package.json
      - run: npm run compile
      - run: npm run test:unit:main -- --testTimeout=5000 --verbose --detectOpenHandles --forceExit
      - run: npm run test:unit:components
      - run: npm run bundle
      - name: Sleep for 4 seconds
        shell: bash
        run: sleep 4
      - name: Publish (Linux arm64)
        if: ${{ startsWith(matrix.os, 'ubuntu') && endsWith(matrix.os, 'arm') }}
        run: npm run publish:linux:arm64
      - name: Publish (all other platforms)
        if: ${{ !startsWith(matrix.os, 'ubuntu') || !endsWith(matrix.os, 'arm') }}
        run: npm run publish
